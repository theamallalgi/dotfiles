# ~/.config/tmux/tmux.conf -- single tmux configuration file
# TODO: After adding ~/.config/tmux/tmux.conf, and reloading (Prefix r), Install Plugins (Prefix I)

set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins" # plugins directory

# General Config
set -sg terminal-overrides ",*:RGB" # enable true color support
set -g repeat-time 1000 # time (ms) to repeat a bind -r key
set -g display-time 900 # time (ms) to display messages
set -g mouse on # enable mouse support
set -g renumber-windows on # renumber windows when one is closed
set -g base-index 1 # start window index at 1
set -g pane-base-index 1 # start pane index at 1
set -g history-limit 10000 # scrollback buffer size
set -g focus-events on # pass focus events to apps inside tmux
setw -g mode-keys vi # use vi keys in copy mode
setw -g aggressive-resize on # resize to smallest active client
set -g escape-time 0 # no delay for escape key

# Prefix
# unbind C-b # remove default prefix
# set -g prefix ` # set backtick as prefix
# bind ` send-prefix # backtick + backtick sends literal backtick

# Reload
bind r source-file ~/.config/tmux/tmux.conf\; display-message "[*] Reloaded configuration file." # reload config

# Status Bar
set -g status on # enable status bar
set -g window-status-bell-style "fg=#e4374b,nobold" # bell alert color
set -g status-style "bg=#110B15,fg=#f6ceff" # status bar colors
set -g status-left "" # nothing on the left
set -g status-right "#[bg=#542a91,fg=#f6ceff] #S " # session name on the right
set -g status-justify left # align window list to left

# Window Status
set -g window-status-format "#[bg=#201638,fg=#542a91] #I:#W " # inactive window format
set -g window-status-current-format "#[bg=#051177,fg=#c0c9c3,bold] #I:#W* " # active window format
set -g window-status-current-style default # let format handle active style
set -g window-status-style default # let format handle inactive style
set -g window-status-separator "" # remove separator between tabs

# Pane Borders
set -g pane-border-lines single # simple dashed border style
set -g pane-border-style "fg=#171717" # inactive pane border color
set -g pane-active-border-style "fg=#542a91" # active pane border color

# Pane Navigation (Prefix + hjkl)
bind h select-pane -L # move left
bind j select-pane -D # move down
bind k select-pane -U # move up
bind l select-pane -R # move right

# Pane Resize (Prefix + Shift + hjkl)
bind -r H resize-pane -L # resize left
bind -r J resize-pane -D # resize down
bind -r K resize-pane -U # resize up
bind -r L resize-pane -R # resize right

# Pane Splits
bind-key | split-window -h -c "#{pane_current_path}" # split horizontal
bind-key - split-window -v -c "#{pane_current_path}" # split vertical

# Arrow Key Pane Navigation
bind Up    select-pane -U # arrow up
bind Down  select-pane -D # arrow down
bind Left  select-pane -L # arrow left
bind Right select-pane -R # arrow right

# Window Navigation
# bind [ previous-window # go to previous window
# bind ] next-window # go to next window
bind Space last-window # toggle last window
bind e choose-window -Z # open window picker
bind z set-option -g status # toggle status bar

# Pane Zoom
bind f resize-pane -Z # toggle zoom current pane

# Session / Client
# bind q detach-client # detach from session
bind b switch-client -l # switch to last session
bind B break-pane -d # break pane into new window

# Utilities
bind g new-window -n lazygit -c "#{pane_current_path}" "lazygit" # open lazygit
bind o command-prompt -p "open app:" "new-window '%%'" # open app in new window
bind X command-prompt -p "kill window: " "kill-window -t '%%'" # kill a window by name
bind E command-prompt -p "join pane from: " "join-pane -h -s '%%'" # join pane from another window
bind -n C-l send-keys C-l # clear screen

# Status Bar Position
bind C-u run-shell "tmux set-option -g status-position top" # move status bar to top
bind C-d run-shell "tmux set-option -g status-position bottom" # move status bar to bottom

# Vim Tmux Navigator (manual bindings, C-l excluded to allow clear screen)
set -g @vim-tmux-navigator-no-mappings 1
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-k) || tmux select-pane -U"

# Plugins
set -g @plugin 'tmux-plugins/tpm' # plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible' # sensible defaults
set -g @plugin 'tmux-plugins/tmux-resurrect' # save and restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum' # auto save sessions
set -g @plugin 'christoomey/vim-tmux-navigator' # seamless vim/tmux navigation
# set -g @continuum-restore 'on' # auto restore last session on start
set -g @resurrect-capture-pane-contents 'on' # save pane contents on session save

# Init TPM
run-shell ~/.config/tmux/plugins/tpm/tpm # initialize tpm
run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux # load resurrect

# unbind and rebind ctrl + l to clear screen
unbind -n C-l
bind -n C-l send-keys C-l

