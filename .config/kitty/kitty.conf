# .config/kitty/kitty.conf - kitty terminal configuration file

# Imports and Calls
env read_from_shell=PATH
# include colors/blue.conf
include colors/zitchdog-grape.conf

# Shell related settings
shell zsh
shell_integration disabled

# General settings
enable_audio_bell no
confirm_os_window_close 0
sync_to_monitor no
remember_window_size yes
# remember_window_size no
allow_remote_control yes

# Appearence settings
font_size 12
font_family KodeMono Nerd Font
# font_size 13.5
# font_family BerkeleyMono Nerd Font
# bold_font BerkeleyMono Nerd Font Bold
# italic_font BerkeleyMono Nerd Font Italic
# bold_italic_font BerkeleyMono Nerd Font Bold Italic
disable_ligatures no

scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0

cursor_shape block
cursor_blink_interval 0
# cursor_trail 3
# cursor_trail_decay 0.1 0.5
cursor_trail 2
cursor_trail_decay 0.025 0.2

initial_window_width 640
initial_window_height 480
window_padding_width 10
url_style curly

# Layout
enabled_layouts splits,stack
# toggle between splits and stack
# map ctrl+shift+\ toggle_layout splits
# splits -- open and close windows
map ctrl+shift+] launch --location=vsplit
map ctrl+shift+[ launch --location=hsplit
map ctrl+shift+\ close_window
# splits -- navigate through windows
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down
# splits - resize windows
map ctrl+shift+right resize_window narrower 3
map ctrl+shift+left resize_window wider 3
map ctrl+shift+down resize_window taller 3
map ctrl+shift+up resize_window shorter 3

# Window switching
map ctrl+; previous_tab
map ctrl+' next_tab
map ctrl+shift+; previous_window
map ctrl+shift+' next_window

# Keymaps and Hotkeys
map ctrl+backspace send_text all \x17
map ctrl+left send_text all \x1bb
map ctrl+right send_text all \x1bf
map ctrl+shift+/ set_tab_title
map ctrl+shift+s save_as_session
map ctrl+shift+p goto_session ~/.config/kitty/session/
