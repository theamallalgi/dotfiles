# mpv.conf - single file configurations for mpv media player

# video settings
geometry=50%:50%               # start window centered
autofit-larger=90%x90%         # limit window size to 90% of screen
# fs=yes                       # start in fullscreen
# keep-open=yes                # keep window open after playback ends
# osc=no                       # disable on screen controller
# ontop=yes                    # keep window above others

# audio settings
volume=80                      # default volume
volume-max=300                 # max allowed volume
sub-auto=fuzzy                 # auto load matching subtitles
audio-file-auto=fuzzy          # auto load matching audio tracks
# audio-pitch-correction=no    # disable pitch correction on speed change

# other settings
save-position-on-quit=yes      # resume playback position

# subtitle and fonts
sub-visibility=yes             # enable subtitles by default
slang=en                       # prefer english subtitles
alang=en                       # prefer english audio
sub-font="Forma DJR Deck"      # subtitle font (falls back if missing)
osd-font="SF Pro Display"      # osd font (falls back if missing)
sub-font-size=20               # subtitle font size
sub-ass=no                     # disable advanced ass styling
sub-border-color=0/0/0/1       # subtitle border color (rgba) #000000
sub-border-size=2.5            # subtitle border thickness
sub-color=1/0.25/0/1           # subtitle text color (rgba) #ff4000
# sub-blur=0.2                 # blur subtitles slightly
# sub-margin-x=100             # horizontal subtitle margin
# sub-margin-y=50              # vertical subtitle margin
# sub-shadow-color=0/0/0/0.25  # subtitle shadow color
# sub-shadow-offset=0          # subtitle shadow offset

# hotkeys
loop-playlist=inf              # shift+l to loop entire playlist
loop-file=inf                  # loop current file

# ui tweaks
# window-corners=round         # not supported in mpv
title-bar=no                   # hide title bar (wayland/x11 dependent)
cursor-autohide=500            # hide cursor after 500ms
osd-bold=yes                   # bold osd text
# osd-blur=2                   # blur osd text

